# ==========================================
# APPLICATION
# ==========================================
spring.application.name=ecommerce

# ==========================================
# DATABASE CONFIGURATION
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=5000
server.forward-headers-strategy=framework
server.use-forward-headers=true
rag.port=8000

# ==========================================
# MAIL CONFIGURATION (GMAIL)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ==========================================
# BANKING CONFIGURATION (SEPAY)
# ==========================================
sepay.account-number=${SEPAY_ACCOUNT_NUMBER}
sepay.bank-name=MB

# ==========================================
# WEBHOOK CONFIGURATION
# ==========================================
hooks.api-key=${HOOKS_API_KEY}
hooks.order-id-pattern=ORDER_
hooks.amount-tolerance=0

# ==========================================
# DOMAIN CONFIGURATION
# ==========================================
app.domain=doantrang.online
rag.domain=rag.doantrang.online

# ==========================================
# RECAPTCHA CONFIGURATION
# ==========================================
recaptcha.site-key=${RECAPTCHA_SITE_KEY}
recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}

# ==========================================
# GENAI API KEYS
# ==========================================
genai.api.embed=${GENAI_API_EMBED}
genai.api.decision=${GENAI_API_DECISION}
genai.api.chat=${GENAI_API_CHAT}

# ==========================================
# LOGGING
# ==========================================
logging.level.root=INFO
logging.level.com.example.ecommerce=INFO

# ==========================================
# ACTUATOR & SWAGGER
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs